<header [class.scrolled]="isScrolled()" [style.--scroll-progress]="scrollProgress()">
  <div class="container nav">
    <a href="#" class="brand" aria-label="Kurd Studio Home">
      <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="logo-g" x1="0" y1="0" x2="1" y2="1">
            <stop stop-color="#ec4899"/>
            <stop offset="1" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#logo-g)"/>
        <path d="M22 18v28M22 32l20-14M22 32l20 14" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="wordmark"><strong>Kurd</strong> <em>Studio</em></span>
    </a>

    <ul role="navigation" aria-label="Main navigation">
      @for (item of siteService.navigation(); track item.id) {
        <li>
          <a [href]="item.link" class="nav-link">
            <span class="nav-icon" [innerHTML]="item.iconSvg | safeHtml"></span>
            {{ item.label }}
          </a>
        </li>
      } @empty {
        <li><a href="#gallery" class="nav-link">Gallery</a></li>
        <li><a href="#writing" class="nav-link">Writing</a></li>
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#contact" class="nav-link">Contact</a></li>
      }
    </ul>

    <button class="theme-btn" (click)="toggleTheme()" aria-label="Toggle theme">
      <svg class="moon" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="sun" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="5" fill="currentColor"/>
        <g stroke="currentColor" stroke-width="2">
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </g>
      </svg>
    </button>

    <button class="menu-btn" [class.active]="isMobileMenuOpen()" (click)="toggleMobileMenu()" aria-label="Open menu" [attr.aria-expanded]="isMobileMenuOpen()">
      <div class="hamburger" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </button>
  </div>
</header>

<!-- Mobile Menu -->
<app-mobile-menu [isOpen]="isMobileMenuOpen()" (close)="closeMobileMenu()" />
