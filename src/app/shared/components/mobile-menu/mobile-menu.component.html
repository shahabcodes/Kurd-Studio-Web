<div class="mobile-menu" [class.open]="isOpen()" [attr.aria-hidden]="!isOpen()" role="dialog" aria-label="Navigation menu">
  <div class="inner">
    <div class="mobile-top">
      <div class="mobile-title">
        <svg width="28" height="28" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="m-g" x1="0" y1="0" x2="1" y2="1">
              <stop stop-color="#ec4899"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
          <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#m-g)"/>
          <path d="M22 20v24M22 32l18-12M22 32l18 12" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        Kurd Studio
      </div>
      <div style="display:flex; gap:10px">
        <button class="theme-btn" (click)="toggleTheme()" aria-label="Toggle theme">
          <svg class="moon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="5" fill="currentColor"/>
          </svg>
        </button>
        <button class="close-btn" (click)="onClose()" aria-label="Close menu">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>
    </div>

    <nav class="mobile-links" aria-label="Mobile navigation">
      <a href="#gallery" (click)="onLinkClick()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Gallery
      </a>
      <a href="#writing" (click)="onLinkClick()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 6h18M3 12h12M3 18h8"/>
        </svg>
        Writing
      </a>
      <a href="#about" (click)="onLinkClick()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 21c2-4 6-6 8-6s6 2 8 6"/>
        </svg>
        About
      </a>
      <a href="#contact" (click)="onLinkClick()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8v.5z"/>
        </svg>
        Contact
      </a>
    </nav>

    <div class="mobile-menu-footer">
      <p>Art · Words · Dreams</p>
    </div>
  </div>
</div>
